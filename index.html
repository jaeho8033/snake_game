<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        color: #e0e0e0;
      }
      #score-display {
        font-size: 24px;
        margin-bottom: 12px;
        letter-spacing: 2px;
      }
      #status-display {
        font-size: 14px;
        margin-bottom: 8px;
        color: #aaa;
      }
      canvas {
        border: 2px solid #4ecca3;
        display: block;
      }
      #hint-display {
        font-size: 12px;
        margin-top: 10px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="score-display">SCORE: <span id="score-value">0</span></div>
    <div id="status-display">READY - Press any arrow key to start</div>
    <canvas id="gameCanvas"></canvas>
    <div id="hint-display">Arrow keys or WASD to move &bull; R to restart</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
